<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/vite.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AdHoardingsDiscovery | Premium Outdoor Advertising Listings</title>
  <meta name="description"
    content="Discover and book premium outdoor hoarding sites. City-wise listings with technical specifications and real-time availability.">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
</head>

<body>
  <div id="root"></div>
  <script>
    // Disable right-click
    document.addEventListener('contextmenu', (e) => e.preventDefault());

    // Disable keyboard shortcuts
    document.onkeydown = (e) => {
      // Disable F12
      if (e.keyCode === 123) {
        return false;
      }
      // Disable Ctrl+Shift+I (Inspector)
      if (e.ctrlKey && e.shiftKey && e.keyCode === 73) {
        return false;
      }
      // Disable Ctrl+Shift+J (Console)
      if (e.ctrlKey && e.shiftKey && e.keyCode === 74) {
        return false;
      }
      // Disable Ctrl+U (View Source)
      if (e.ctrlKey && e.keyCode === 85) {
        return false;
      }
      // Disable Ctrl+Shift+C (Element Selector)
      if (e.ctrlKey && e.shiftKey && e.keyCode === 67) {
        return false;
      }
    };
  </script>
  <script type="module" src="/src/main.jsx"></script>
</body>

</html>
