<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon"
    href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🏙️</text></svg>">
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AdHoardings Discovery | Premium Outdoor Advertising Listings</title>
  <meta name="description"
    content="The premium destination to discover, verify and book high-impact outdoor hoarding sites. Search over 500+ premium billboard assets across India's top cities.">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
</head>

<body>
  <div id="root"></div>
  <script>
    // Disable right-click
    document.addEventListener('contextmenu', (e) => e.preventDefault());

    // Disable keyboard shortcuts
    document.onkeydown = (e) => {
      // Disable F12
      if (e.keyCode === 123) {
        return false;
      }
      // Disable Ctrl+Shift+I (Inspector)
      if (e.ctrlKey && e.shiftKey && e.keyCode === 73) {
        return false;
      }
      // Disable Ctrl+Shift+J (Console)
      if (e.ctrlKey && e.shiftKey && e.keyCode === 74) {
        return false;
      }
      // Disable Ctrl+U (View Source)
      if (e.ctrlKey && e.keyCode === 85) {
        return false;
      }
      // Disable Ctrl+Shift+C (Element Selector)
      if (e.ctrlKey && e.shiftKey && e.keyCode === 67) {
        return false;
      }
    };
  </script>
  <script type="module" src="/src/main.jsx"></script>
</body>

</html>
